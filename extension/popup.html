<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 260px; margin: 0; font: 13px -apple-system, system-ui, sans-serif; color: #eef0fb;
      background: linear-gradient(160deg, #141a3a, #0a0e22); padding: 16px; }
    .logo { width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 10px;
      background: radial-gradient(circle at 36% 32%, #fff, #cfd3ff 16%, #9a8cf0 44%, #6a59c8 72%, #3a2f80 100%); }
    h1 { font-size: 15px; text-align: center; margin: 0 0 2px; }
    .sub { text-align: center; font-size: 11px; color: #9aa2c6; margin: 0 0 14px; }
    .status { display: flex; align-items: center; gap: 7px; font-size: 12px; padding: 8px 10px; border-radius: 10px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); margin-bottom: 10px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .on { background: #18b083; } .off { background: #6b7196; }
    button { width: 100%; border: none; border-radius: 10px; padding: 10px; font-size: 13px; font-weight: 600; color: #fff; cursor: pointer;
      background: linear-gradient(120deg, #8b7bf0, #6aa8ff); margin-bottom: 8px; }
    a.link { display: block; text-align: center; color: #6aa8ff; font-size: 12px; text-decoration: none; }
    .note { font-size: 10.5px; color: #6b7196; margin-top: 10px; line-height: 1.5; text-align: center; }
  </style>
</head>
<body>
  <div class="logo"></div>
  <h1>Liquid Planner Sync</h1>
  <p class="sub">Auto-imports your UW DARS audit</p>
  <div class="status"><span id="dot" class="dot off"></span><span id="statusText">Checking…</span></div>
  <button id="open">Open my DARS audit</button>
  <button id="sync" style="background: rgba(255,255,255,.08);">Sync now (on DARS page)</button>
  <a class="link" id="app" href="#" target="_blank">Open Liquid Planner</a>
  <p class="note">Sign in to Liquid Planner once so the extension is connected. Then just open your DARS audit — it syncs automatically.</p>
  <script src="popup.js"></script>
</body>
</html>
